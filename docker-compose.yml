# AgriSentinel local stack: one command brings up the lake (MinIO), the spatial
# + vector store (PostGIS+pgvector), the event stream (Apache Kafka, KRaft mode),
# the API, and the stream worker. Only ANTHROPIC_API_KEY needs to come from your
# .env; all other values are self-contained local-dev defaults (change them for
# any real deployment — they are NOT secrets specific to any machine).
#
# The core pipeline (ingest → detect → join → evaluate → dossiers → dashboard)
# depends only on MinIO + PostGIS; Kafka drives the optional streaming bonus
# (new detection → worker → dossiers → live dashboard update). Kafka (JVM) is
# used instead of Redpanda for CPU portability; both speak the Kafka API.

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agrisentinel
      MINIO_ROOT_PASSWORD: agrisentinel
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data

  postgis:
    build:
      context: .
      dockerfile: docker/postgis.Dockerfile
    environment:
      POSTGRES_USER: agrisentinel
      POSTGRES_PASSWORD: agrisentinel
      POSTGRES_DB: agrisentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrisentinel -d agrisentinel"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 8s
      timeout: 6s
      retries: 25

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: &app_env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      DATABASE_URL: postgresql://agrisentinel:agrisentinel@postgis:5432/agrisentinel
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: agrisentinel
      S3_SECRET_KEY: agrisentinel
      S3_BUCKET: agrisentinel
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_DETECTIONS: agrisentinel.detections
      AOI_CONFIG: config/aoi_changhua.yaml
      CHANGE_DETECTOR: ${CHANGE_DETECTOR:-spectral}
      EMBEDDER: ${EMBEDDER:-tfidf-svd}
      EMBED_DIM: ${EMBED_DIM:-384}
      ALLOW_OFFLINE_FALLBACK: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    # The core pipeline only needs storage; the stream is best-effort.
    depends_on:
      postgis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "api.stream"]
    restart: unless-stopped
    environment: *app_env
    depends_on:
      postgis:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_healthy

volumes:
  minio-data:
  pgdata:
  kafka-data:
